name: IDS Hybrid Downloader v11

on:
  repository_dispatch:
    types: [start_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install telegram axios fs-extra

      - name: Install yt-dlp
        if: |
          github.event.client_payload.mode == 'download' ||
          github.event.client_payload.mode == 'dl_audio'
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install ffmpeg + ffprobe
        if: |
          github.event.client_payload.mode == 'c2v' ||
          github.event.client_payload.mode == 'c2d'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Processing Script
        env:
          MODE:           ${{ github.event.client_payload.mode }}
          URL:            ${{ github.event.client_payload.url }}
          CHAT_ID:        ${{ github.event.client_payload.chat_id }}
          TARGET_FILE_ID: ${{ github.event.client_payload.target_file_id }}
          THUMB_FILE_ID:  ${{ github.event.client_payload.thumb_file_id }}
          NEW_NAME:       ${{ github.event.client_payload.new_name }}
          API_ID:         ${{ secrets.API_ID }}
          API_HASH:       ${{ secrets.API_HASH }}
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
        run: node github_downloader.js
