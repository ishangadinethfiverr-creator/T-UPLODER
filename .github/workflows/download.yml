name: IDS Hybrid Downloader v10

on:
  repository_dispatch:
    types: [start_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg p7zip-full

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install telegram axios fs-extra form-data

      # yt-dlp: download + dl_audio modes
      - name: Install yt-dlp
        if: |
          github.event.client_payload.mode == 'download' ||
          github.event.client_payload.mode == 'dl_audio'
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Run Processing Script
        env:
          MODE:           ${{ github.event.client_payload.mode }}
          URL:            ${{ github.event.client_payload.url }}
          CHAT_ID:        ${{ github.event.client_payload.chat_id }}
          TARGET_FILE_ID: ${{ github.event.client_payload.target_file_id }}
          SOURCE_MSG_ID:  ${{ github.event.client_payload.source_msg_id }}
          THUMB_FILE_ID:  ${{ github.event.client_payload.thumb_file_id }}
          NEW_NAME:       ${{ github.event.client_payload.new_name }}
          SPLIT_LIMIT:    ${{ github.event.client_payload.split_limit }}
          # ✅ Dynamic Credentials (Multi-Bot Support)
          API_ID:         ${{ github.event.client_payload.api_id }}
          API_HASH:       ${{ github.event.client_payload.api_hash }}
          BOT_TOKEN:      ${{ github.event.client_payload.bot_token }}
        run: node github_downloader.js
