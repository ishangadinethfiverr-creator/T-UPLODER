name: IDS Hybrid Downloader v10

on:
  repository_dispatch:
    types: [start_download]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm install telegram axios fs-extra form-data

      # yt-dlp: download + dl_audio modes
      - name: Install yt-dlp
        if: |
          github.event.client_payload.mode == 'download' ||
          github.event.client_payload.mode == 'dl_audio'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          python3 -m pip install -U yt-dlp --break-system-packages

      - name: Run Processing Script
        env:
          MODE:           ${{ github.event.client_payload.mode }}
          URL:            ${{ github.event.client_payload.url }}
          CHAT_ID:        ${{ github.event.client_payload.chat_id }}
          TARGET_FILE_ID: ${{ github.event.client_payload.target_file_id }}
          SOURCE_MSG_ID:  ${{ github.event.client_payload.source_msg_id }}
          THUMB_FILE_ID:  ${{ github.event.client_payload.thumb_file_id }}
          NEW_NAME:       ${{ github.event.client_payload.new_name }}
          API_ID:         ${{ secrets.API_ID }}
          API_HASH:       ${{ secrets.API_HASH }}
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          YT_COOKIES_DATA: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES_DATA" ]; then
            echo "$YT_COOKIES_DATA" > youtube_cookies.txt
            echo "🍪 YouTube Cookies loaded"
          fi
          node github_downloader.js
